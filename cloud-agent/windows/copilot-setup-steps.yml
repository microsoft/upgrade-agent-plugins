name: "Copilot Setup Steps"
on:
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
jobs:
  copilot-setup-steps:
    # set runs-on to 'windows-latest' or 'ubuntu-latest' based on your needs
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
